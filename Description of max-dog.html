<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max's Bio</title>
    <!-- Attractive Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">

<body>
    <div class="card">
        <h1 class="title">MAX</h1>

                <div class="entry">
                    <span class="emoji">📅</span>
                    <label>I arrived on Earth</label>
                    <p>20 December 2025</p>
                </div>
                <div class="entry">
                    <span class="emoji">🎾</span>
                    <label>Favorite toy</label>

                </div>
                <div class="entry">
                    <span class="emoji">💤</span>
                    <label>Favorite activity</label>
                    <p>Run, sleep, play</p>
                </div>
                <div class="entry">
                    <span class="emoji">🥕</span>
                    <label>Favorite food</label>
                    <p>Soft bananas and Mangos</p>
                </div>
            </aside>
            <!-- Creative Image Frame -->
            <div class="photo-container">
                <img src="max-dog.jfif" alt="Max">
            </div>
        </div>
        <footer>
            <p>"The Sun-Kissed Sweetheart: With a coat the colour of toasted honey and a warm, inviting smile, this dog is a living ray of sunshine."</p>
            <span class="tagline">Looking for a wonderful family to be a part of!</span>
        </footer>
    </div>
