<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petify - Forgot Password</title>
    <link rel="stylesheet" href="login style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <!-- Animated background shapes -->
    <div class="blob"></div>
    <div class="blob2"></div>

    <div class="login-wrapper">
        <div class="glass-card">
            <div class="logo">🦴</div>
            <h2>Lost your <span>Leash?</span></h2>
            <p>Don't worry! Enter your email, and we'll help you find your way back.</p>
            
            <form id="forgotPasswordForm">
                <div class="input-group">
                    <input type="email" id="recoveryEmail" placeholder=" " required>
                    <label>Email Address</label>
                </div>

                <button type="submit" class="glow-btn">Send Recovery Link</button>
            </form>

            <p class="footer">Remembered it? <a href="login page.html">Back to Login</a></p>
        </div>
    </div>
    <script src="forgot password.js"></script>
</body>
</html>
