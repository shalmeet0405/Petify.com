<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petify - Login</title>
    <link rel="stylesheet" href="login style.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>
    <!-- Animated background shapes (Same as Sign Up) -->
    <div class="blob"></div>
    <div class="blob2"></div>

    <div class="login-wrapper">
        <div class="glass-card">
            <div class="logo">🐾</div>
            <h2>Welcome Back to <span>Petify</span></h2>
            <p>Your furry friends missed you!</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder=" " required>
                    <label>Email Address</label>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder=" " required>
                    <label>Password</label>
                </div>

                <div class="options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="forgot password.html" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="glow-btn">Log In</button>
            </form>

            <p class="footer">New to the pack? <a href="Sign-up Page.html">Join now</a></p>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
